<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Board to Notion</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="title">Job Board to Notion</div>
        <div class="subtitle">Extract and save job posts in one click.</div>
      </header>

      <section class="panel">
        <div class="button-row">
          <button id="saveBtn" class="button success">Save to notion</button>
          <button id="appliedBtn" class="button">Marked as Applied</button>
        </div>
      </section>

      <section class="panel result">
        <div class="label">Extracted</div>
        <div class="kv">
          <div class="key">Position</div>
          <div id="jobTitle" class="value">-</div>
          <div class="key">Company</div>
          <div id="companyName" class="value">-</div>
          <div class="key">Link</div>
          <div id="jobLink" class="value">-</div>
        </div>
        <div id="savedStatus" class="status muted">Not saved yet.</div>
        <div id="status" class="status muted">Waiting for extraction...</div>
        <details class="debug">
          <summary>Debug JSON</summary>
          <pre id="resultJson" class="result-json">{}</pre>
        </details>
      </section>

      <section class="panel">
        <div class="label">Today</div>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Applied Today</div>
            <div id="appliedToday" class="stat-value">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Vs Yesterday</div>
            <div id="appliedDelta" class="stat-value">0</div>
          </div>
        </div>
      </section>

      <div class="footer-actions">
        <button id="testBtn" class="link-button">Test Notion connection</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
